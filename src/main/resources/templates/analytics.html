<!-- Analytics Page - Display user carbon footprint analytics and statistics -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title> Carbon Challenge! </title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styling.css">
</head>

  <body>
    <!-- Top navigation bar with logo and logout functionality -->
    <div id="top-bar">
      <div id="topbar-left">
        <img src="Footprint.png" id="logo" alt="footprint" />
        <h1>FOOTPRINT</h1>
      </div>
      <!-- Logout form with CSRF protection -->
      <form th:action="@{/logout}" th:object="${user}" method="post">
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />
        <button class="log-out" type="submit">Log Out</button>
      </form>
    </div>

    <!-- The sidebar -->
    <div id="main-task-container">
      <button class="dropdown-button">Menu</button>
      <div class="sidebar">
        <a href="tasks">Tasks</a>
        <a href="profile">Profile</a>
        <a href="leaderboard">Leaderboard</a>
        <a href="groups">Groups</a>
        <a class="active" href="analytics">Analytics</a>
        <a href="evidence">Evidence</a>
        <!-- Challenges link only visible to moderators using Spring Security authorization -->
        <a sec:authorize="hasRole('ROLE_MODERATOR')" href="challenges"
          >Challenges</a
        >
        <a href="settings">Settings</a>
        <a href="travel">Travel</a>
        <a href="badges">Badges</a>
      </div>

      <div id="analytics-tab-wrapper">
      <div class="tab">
        <button class="tablinks" id="defaultOpen" onclick="openTab(event, 'Weekly')">Weekly</button>
        <button class="tablinks" onclick="openTab(event, 'Monthly')">Monthly</button>
        <button class="tablinks" onclick="openTab(event, 'Total')">Total</button>
        <button class="tablinks" onclick="openTab(event, 'ActionBreakdown')">Action Breakdown</button>
      </div>
      
          
        <div id="Weekly" class="tab-content">
          <h1>Weekly Stats</h1>
 
            <div class="chart-container">
              <canvas id="weeklyPieChart"></canvas>
              <canvas id="weeklyLineChart"></canvas>
            </div>
          </div>

        <div id="Monthly" class="tab-content">
          <h1>Monthly Stats</h1>

            <div class="chart-container">
              <canvas id="monthlyPieChart"></canvas>
              <canvas id="monthlyLineChart"></canvas>
            </div>
        </div>

        <div id="Total" class="tab-content">
          <h1>Total Stats</h1>

            <div class="chart-container">
              <canvas id="totalPieChart"></canvas>
              <canvas id="totalLineChart"></canvas>
            </div>
        </div>

        <div id="ActionBreakdown" class="tab-content">
          <h1>Action Stats</h1>
          There will be a pie chart
        </div>
      </div>
      </div>

    <script th:inline="javascript">
      function openTab(event, tabName){
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++){
          tabcontent[i].style.display = "none";
        }

        tablinks = document.getElementsByClassName("tablinks");
        for (i = 0; i < tablinks.length; i++){
          tablinks[i].className = tablinks[i].className.replace(" active", "");
        }

        document.getElementById(tabName).style.display = "block";
        event.currentTarget.className += " active";
      }

      window.onload = function(){
        document.getElementById("defaultOpen").click();
      };

      let labelsWeek = /*[[${weekLabels}]]*/['Jan', 'Feb', 'Mar','Apr', 'May'];
      let datasetWeek = /*[[${weekPoints}]]*/[10,20,30,35,40];
      let labelsMonth = /*[[${monthLabels}]]*/['Jan', 'Feb', 'Mar','Apr', 'May'];
      let datasetMonth = /*[[${monthPoints}]]*/[10,20,30,35,40];
      let labelsTotal = /*[[${allLabels}]]*/['Jan', 'Feb', 'Mar','Apr', 'May'];
      let datasetTotal = /*[[${allPointsByMonth}]]*/[10,20,30,35,40];

      let labelsPieWeek = /*[[${weekTaxPie}]]*/['Jan', 'Feb', 'Mar','Apr', 'May'];
      let datasetPieWeek = /*[[${weekPointsPie}]]*/[10,20,30,35,40];
      let labelsPieMonth = /*[[${monthTaxPie}]]*/['Jan', 'Feb', 'Mar','Apr', 'May'];
      let datasetPieMonth = /*[[${monthPointsPie}]]*/[10,20,30,35,40];
      let labelsPieTotal = /*[[${allTaxPie}]]*/['Jan', 'Feb', 'Mar','Apr', 'May'];
      let datasetPieTotal = /*[[${allPointsPie}]]*/[10,20,30,35,40];
      //let dataset2 = [15,30,45,60,76];

      let weeklyLineChart = document.getElementById('weeklyLineChart').getContext('2d');
      new Chart(weeklyLineChart, {
        type: 'line',
        data: {
          labels: labelsWeek, 
          datasets: [{
          label: 'Yours',
          data: datasetWeek,
          borderColor: '#026440',
          borderWidth: 2,
          fill: false,
        }
      // {
      //   label: 'Average',
      //   data: dataset2,
      //   borderColor: '#33e9a6',
      //   borderWidth: 2,
      //   fill: false,
      // }
    ]
    },
      options:{
        responsive: true,
        scales: {
          x: {
            title: {
              display: true,
              text: 'Days',
              font:{
                padding: 4,
                size: 10,
                weight: 'bold',
                family: 'Arial'
              }, 
              color: '#026440'
            }
          },
          y:{
            title:{
              display: true,
              text: 'Carbon Saved (kg CO2e)',
              font: {
                size: 10,
                weight: 'bold',
                family: 'Arial'
              },
              color: '#026440'
            },
            beginAtZero: true,
            scaleLabel: {
              display: true,
              labelString: 'Values',
            }
          }
        }
      }
      });

      let monthlyLineChart = document.getElementById('monthlyLineChart').getContext('2d');
      new Chart(monthlyLineChart, {
        type: 'line',
        data: {
          labels: labelsMonth, 
          datasets: [{
          label: 'Yours',
          data: datasetMonth,
          borderColor: '#026440',
          borderWidth: 2,
          fill: false,
        }
      // {
      //   label: 'Average',
      //   data: dataset2,
      //   borderColor: '#33e9a6',
      //   borderWidth: 2,
      //   fill: false,
      // }
    ]
    },
      options:{
        responsive: true,
        scales: {
          x: {
            title: {
              display: true,
              text: 'Dates',
              font:{
                padding: 4,
                size: 10,
                weight: 'bold',
                family: 'Arial'
              }, 
              color: '#026440'
            }
          },
          y:{
            title:{
              display: true,
              text: 'Carbon Saved (kg CO2e)',
              font: {
                size: 10,
                weight: 'bold',
                family: 'Arial'
              },
              color: '#026440'
            },
            beginAtZero: true,
            scaleLabel: {
              display: true,
              labelString: 'Values',
            }
          }
        }
      }
      });

      let totalLineChart = document.getElementById('totalLineChart').getContext('2d');
      new Chart(totalLineChart, {
        type: 'line',
        data: {
          labels: labelsTotal, 
          datasets: [{
          label: 'Yours',
          data: datasetTotal,
          borderColor: '#026440',
          borderWidth: 2,
          fill: false,
        }
      // {
      //   label: 'Average',
      //   data: dataset2,
      //   borderColor: '#33e9a6',
      //   borderWidth: 2,
      //   fill: false,
      // }
    ]
    },
      options:{
        responsive: true,
        scales: {
          x: {
            title: {
              display: true,
              text: 'Months',
              font:{
                padding: 4,
                size: 10,
                weight: 'bold',
                family: 'Arial'
              }, 
              color: '#026440'
            }
          },
          y:{
            title:{
              display: true,
              text: 'Carbon Saved (kg CO2e)',
              font: {
                size: 10,
                weight: 'bold',
                family: 'Arial'
              },
              color: '#026440'
            },
            beginAtZero: true,
            scaleLabel: {
              display: true,
              labelString: 'Values',
            }
          }
        }
      }
      });

      const weeklyPieChart = document.getElementById('weeklyPieChart').getContext('2d');
      new Chart(weeklyPieChart,{
        type: 'pie',
        data: {
          labels: labelsPieWeek,
          datasets: [{
            label: 'Carbon Saved (kg CO2e)',
            data: datasetPieWeek,
            backgroundColor: ['#33e9a6','#013220','#026440'],
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'top' }
          }
        }
      });

      const monthlyPieChart = document.getElementById('monthlyPieChart').getContext('2d');
      new Chart(monthlyPieChart,{
        type: 'pie',
        data: {
          labels: labelsPieMonth,
          datasets: [{
            label: 'Carbon Saved (kg CO2e)',
            data: datasetPieMonth,
            backgroundColor: ['#33e9a6','#013220','#026440'],
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'top' }
          }
        }
      });

      const totalPieChart = document.getElementById('totalPieChart').getContext('2d');
      new Chart(totalPieChart,{
        type: 'pie',
        data: {
          labels: labelsPieTotal,
          datasets: [{
            label: 'Carbon Saved (kg CO2e)',
            data: datasetPieTotal,
            backgroundColor: ['#33e9a6','#013220','#026440'],
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'top' }
          }
        }
      });

      let dropdown = document.querySelector(".dropdown-button");
      let dropdown_menu = document.querySelector(".sidebar");

      dropdown.addEventListener("click", (e) => {
        e.preventDefault();
        dropdown_menu.classList.toggle("open");
      });
    </script>
    </div>
</body>
</html>
