<!-- Analytics Page - Display user carbon footprint analytics and statistics -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title> Carbon Challenge! </title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styling.css">
</head>

  <body>
    <!-- Top navigation bar with logo and logout functionality -->
    <div id="top-bar">
      <div id="topbar-left">
        <img src="Footprint.png" id="logo" alt="footprint" />
        <h1>FOOTPRINT</h1>
      </div>
      <!-- Logout form with CSRF protection -->
      <form th:action="@{/logout}" th:object="${user}" method="post">
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />
        <button class="log-out" type="submit">Log Out</button>
      </form>
    </div>

    <!-- The sidebar -->
    <div id="main-task-container">
      <button class="dropdown-button">Menu</button>
      <div class="sidebar">
        <a href="tasks">Tasks</a>
        <a href="profile">Profile</a>
        <a href="leaderboard">Leaderboard</a>
        <a href="groups">Groups</a>
        <a class="active" href="analytics">Analytics</a>
        <a href="evidence">Evidence</a>
        <!-- Challenges link only visible to moderators using Spring Security authorization -->
        <a sec:authorize="hasRole('ROLE_MODERATOR')" href="challenges"
          >Challenges</a
        >
        <a href="settings">Settings</a>
        <a href="travel">Travel</a>
        <a href="badges">Badges</a>
      </div>

      <div id="analytics-tab-wrapper">
        <div class="analytics-shell">
          <h1 id="analyticsTitle">Analytics</h1>

          <div class="analytics-controls">
            <div class="control-group">
              <label for="timeframeSelect">Timeframe</label>
              <select id="timeframeSelect">
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="all">All Time</option>
              </select>
            </div>

            <div class="control-group">
              <label for="scopeSelect">Scope</label>
              <select id="scopeSelect">
                <option value="individual">Individual</option>
                <option value="year">Year</option>
                <option value="campus">Campus</option>
              </select>
            </div>
          </div>

          <div class="chart-container analytics-chart-container">
            <div class="analytics-chart-card">
              <h2>Category Breakdown</h2>
              <canvas id="analyticsPieChart"></canvas>
            </div>
            <div class="analytics-chart-card">
              <h2>Carbon Saved Over Time</h2>
              <canvas id="analyticsLineChart"></canvas>
            </div>
          </div>
        </div>
      </div>
      </div>

    <script th:inline="javascript">
      const analyticsDataByScope = /*[[${analyticsDataByScope}]]*/ {};
      const currentYear = /*[[${currentYear}]]*/ '';
      const currentCampus = /*[[${currentCampus}]]*/ '';

      const timeframeSelect = document.getElementById('timeframeSelect');
      const scopeSelect = document.getElementById('scopeSelect');
      const analyticsTitle = document.getElementById('analyticsTitle');

      const pieContext = document.getElementById('analyticsPieChart').getContext('2d');
      const lineContext = document.getElementById('analyticsLineChart').getContext('2d');

      let pieChart = null;
      let lineChart = null;

      const pieColors = ['#33e9a6', '#013220', '#026440', '#1d8f6c', '#006a6a', '#68b0ab', '#9cc5a1'];

      function prettyScopeLabel(scope) {
        if (scope === 'individual') {
          return 'Individual';
        }
        if (scope === 'year') {
          return 'Year: ' + (currentYear || 'Unknown');
        }
        if (scope === 'campus') {
          return 'Campus: ' + (currentCampus || 'Unknown');
        }
        return scope;
      }

      function prettyTimeframeLabel(timeframe) {
        if (timeframe === 'weekly') {
          return 'Weekly';
        }
        if (timeframe === 'monthly') {
          return 'Monthly';
        }
        return 'All Time';
      }

      function renderCharts() {
        const scope = scopeSelect.value;
        const timeframe = timeframeSelect.value;

        const scopeData = analyticsDataByScope[scope] || {};
        const chartData = scopeData[timeframe] || {
          lineLabels: [],
          linePoints: [],
          pieLabels: [],
          piePoints: []
        };

        analyticsTitle.textContent = prettyScopeLabel(scope) + ' - ' + prettyTimeframeLabel(timeframe) + ' Stats';

        if (pieChart) {
          pieChart.destroy();
        }
        pieChart = new Chart(pieContext, {
          type: 'pie',
          data: {
            labels: chartData.pieLabels,
            datasets: [{
              label: 'Carbon Saved (kg CO2e)',
              data: chartData.piePoints,
              backgroundColor: pieColors,
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { position: 'top' }
            }
          }
        });

        if (lineChart) {
          lineChart.destroy();
        }
        lineChart = new Chart(lineContext, {
          type: 'line',
          data: {
            labels: chartData.lineLabels,
            datasets: [{
              label: 'Carbon Saved (kg CO2e)',
              data: chartData.linePoints,
              borderColor: '#026440',
              backgroundColor: 'rgba(2, 100, 64, 0.2)',
              borderWidth: 2,
              fill: true,
              tension: 0.25
            }]
          },
          options: {
            responsive: true,
            scales: {
              x: {
                title: {
                  display: true,
                  text: 'Time'
                }
              },
              y: {
                title: {
                  display: true,
                  text: 'Carbon Saved (kg CO2e)'
                },
                beginAtZero: true
              }
            }
          }
        });
      }

      timeframeSelect.addEventListener('change', renderCharts);
      scopeSelect.addEventListener('change', renderCharts);
      renderCharts();

      let dropdown = document.querySelector(".dropdown-button");
      let dropdown_menu = document.querySelector(".sidebar");

      dropdown.addEventListener("click", (e) => {
        e.preventDefault();
        dropdown_menu.classList.toggle("open");
      });
    </script>
    </div>
</body>
</html>
