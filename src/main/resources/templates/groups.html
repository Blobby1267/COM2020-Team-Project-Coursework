<!-- Groups Page - Manage user groups, join existing groups, and create new groups -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Carbon Challenge!</title>
    <link rel="stylesheet" href="styling.css" />
  </head>

  <body>
    <!-- Top navigation bar with logo and logout functionality -->
    <div id="top-bar">
      <div id="topbar-left">
        <img src="Footprint.png" id="logo" alt="footprint" />
        <h1>FOOTPRINT</h1>
      </div>
      <!-- Logout form with CSRF protection -->
      <form th:action="@{/logout}" th:object="${user}" method="post">
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />
        <button class="log-out" type="submit">Log Out</button>
      </form>
    </div>

    <!-- The sidebar -->
    <div id="main-task-container">
      <button class="dropdown-button">Menu</button>
      <div class="sidebar">
        <a href="tasks">Tasks</a>
        <a href="profile">Profile</a>
        <a href="leaderboard">Leaderboard</a>
        <a class="active" href="groups">Groups</a>
        <a href="analytics">Analytics</a>
        <a href="evidence">Evidence</a>
        <!-- Challenges link only visible to moderators using Spring Security authorization -->
        <a sec:authorize="hasRole('ROLE_MODERATOR')" href="challenges"
          >Challenges</a
        >
        <a href="settings">Settings</a>
        <a href="travel">Travel</a>
        <a href="badges">Badges</a>
      </div>

      <!-- Main content area displaying groups information -->
      <div id="task-information-container">
        <div id="group-wrapper">
          <div id="group-settings-box" class="section">
            <div class="groups-box">
              <h1>Join a group:</h1>
              <form th:action="@{/join_group}" method="post">
                <p>
                  <input
                    th:name="@{groupIdString}"
                    placeholder="Group Code..."
                  />
                </p>
                <p>
                  <button type="submit">Join Group</button>
                </p>
              </form>
            </div>
            <!-- Create new group section -->
            <div class="groups-box">
              <h1>Create a group:</h1>
              <form th:action="@{/create_group}" method="post">
                <p>
                  <input name="groupName" placeholder="Group Name..." />
                </p>
                <p>
                  <button type="submit">Create Group</button>
                </p>
              </form>
            </div>
          </div>
          <!-- Display existing groups -->
          <div id="group-display-box" class="section">
            <div class="groups-box">
              <h1>Groups:</h1>
              <div th:each="group, iterStat : ${groups}">
                <div th:id="${iterStat.index}" class="containerTab">
                  <h3 th:text="${group.name}"></h3>
                  <p>Points: <span th:text="${group.totalPoints}"></span></p>
                  <p>Code: <span th:text="${group.inviteCode}"></span></p>
                  <div th:if="${group.owner.username == #authentication.name}">
                    <form th:action="@{/disband_group}" method="post">
                      <input
                        type="hidden"
                        name="groupId"
                        th:value="${group.id}"
                      />
                      <button type="submit" class="deny-button">Disband</button>
                    </form>
                  </div>
                  <div th:if="${group.owner.username != #authentication.name}">
                    <form th:action="@{/leave_group}" method="post">
                      <input
                        type="hidden"
                        name="groupId"
                        th:value="${group.id}"
                      />
                      <button type="submit" class="deny-button">Leave</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let dropdown = document.querySelector(".dropdown-button");
      let dropdown_menu = document.querySelector(".sidebar");

      dropdown.addEventListener("click", (e) => {
        e.preventDefault();
        dropdown_menu.classList.toggle("open");
      });
    </script>
  </body>
</html>
