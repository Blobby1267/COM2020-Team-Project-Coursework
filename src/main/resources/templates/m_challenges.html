<!-- Moderator Challenges Page - Create and manage challenges (moderator-only access) -->
<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <title>Carbon Challenge!</title>
    <link rel="stylesheet" href="styling.css" />
  </head>

  <body>
    <!-- Top navigation bar with logo and logout functionality -->
    <div id="top-bar">
      <div id="topbar-left">
        <img src="Footprint.png" id="logo" alt="footprint" />
        <h1>FOOTPRINT</h1>
      </div>
      <!-- Logout form with CSRF protection -->
      <form th:action="@{/logout}" th:object="${user}" method="post">
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />
        <button class="log-out" type="submit">Log Out</button>
      </form>
    </div>

    <!-- The sidebar -->
    <div id="main-task-container">
      <button class="dropdown-button">Menu <img src="arrow-down.png" /></button>
      <div class="sidebar">
        <a href="tasks">Tasks</a>
        <a href="profile">Profile</a>
        <a href="leaderboard">Leaderboard</a>
        <a href="groups">Groups</a>
        <a href="analytics">Analytics</a>
        <a href="evidence">Evidence</a>
        <a class="active" href="challenges">Challenges</a>
        <a href="settings">Settings</a>
        <a href="travel">Travel</a>
        <a href="badges">Badges</a>
      </div>

      <!-- Main content area for challenge creation -->
      <div id="task-information-container">
        <div class="settings-box">
          <h1>Create challenge</h1>
          <!-- Challenge name input form -->
          <form th:action="@{/create_challenge}" method="post">
            <p>
              <label for="challengeName">Challenge name: </label>
              <input name="challengeName" placeholder="Challenge name..." />
            </p>

            <p>
              <label for="description">Description:</label>
              <input name = "description" placeholder="Description..."/>
            </p>
          <!-- Challenge start date form -->

            <p>
              <label for="startDate">Start date: </label>
              <input type="date" id="startDate" name="startDate" />
            </p>


          <!-- Challenge end date form -->
 
            <p>
              <label for="endDate">End date: </label>
              <input type="date" id="endDate" name="endDate" />
            </p>


          <!-- Challenge points value form -->
            <p>
              <label for="carbonSaved">Carbon Saved: </label>
              <input name="carbonSaved" placeholder="carbon saved..." />
            </p>


          <!-- Challenge taxonomy dropdown -->
          <p>
            <label for="taxonomy">Taxonomy: </label>
            <select name="taxonomy">
              <option value="diet">Diet</option>
              <option value="transport">Transport</option>
              <option value="waste">Waste</option>
              <option value="food">Food</option>
              <option value="energy">Energy</option>
              <option value="resources">Resources</option>
              <option value="consumption">Consumption</option>
            </select>
          </p>

          <!-- Challenge type dropdown -->
            <p>
              <label for="challengeType">Challenge type: </label>
              <select name="challengeType">
                <option value="evidence">Sumbit Evidence</option>
                <option value="no_evidence">No Evidence</option>
              </select>
            </p>

            <p>
              <label for="frequency">Frequency:</label>
              <select name="frequency">
                <option value="Daily">Daily</option>
                <option value="Weekly">Weekly</option>
                <option value="Monthly">Monthly</option>
              </select>
            </p>
            <p>
              <button type="submit">Submit</button>
            </p>
          </form>
        </div>
      </div>
    </div>

    <script>
      let dropdown = document.querySelector(".dropdown-button");
      let dropdown_menu = document.querySelector(".sidebar");

      dropdown.addEventListener("click", (e) => {
        e.preventDefault();
        dropdown_menu.classList.toggle("open");
        if (dropdown_menu.classList.contains("open")) {
          document.getElementById("task-information-container").style.display =
            "none";
        } else {
          document.getElementById("task-information-container").style.display =
            "flex";
        }
      });

      window.addEventListener("resize", (e) => {
        if (
          dropdown_menu.classList.contains("open") &&
          !window.matchMedia("(max-width: 1000px)").matches
        ) {
          dropdown_menu.classList.toggle("open");
          document.getElementById("task-information-container").style.display =
            "flex";
        }
      });
    </script>
  </body>
</html>
