<!-- Leaderboard Page - Display ranked list of users by points -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Carbon Challenge!</title>
    <link rel="stylesheet" href="styling.css" />
  </head>

  <body>
    <!-- Top navigation bar with logo and logout functionality -->
    <div id="top-bar">
      <div id="topbar-left">
        <img src="Footprint.png" id="logo" alt="footprint" />
        <h1>FOOTPRINT</h1>
      </div>
      <!-- Logout form with CSRF protection -->
      <form th:action="@{/logout}" th:object="${user}" method="post">
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />
        <button class="log-out" type="submit">Log Out</button>
      </form>
    </div>

    <!-- The sidebar -->
    <div id="main-task-container">
      <button class="dropdown-button">Menu <img src="arrow-down.png" /></button>
      <div class="sidebar">
        <a href="tasks">Tasks</a>
        <a href="profile">Profile</a>
        <a class="active" href="leaderboard">Leaderboard</a>
        <a href="groups">Groups</a>
        <a href="analytics">Analytics</a>
        <a href="evidence">Evidence</a>
        <!-- Challenges link only visible to moderators using Spring Security authorization -->
        <a sec:authorize="hasRole('ROLE_MODERATOR')" href="challenges"
          >Challenges</a
        >
        <a href="settings">Settings</a>
        <a href="travel">Travel</a>
        <a href="badges">Badges</a>
      </div>

      <div id="analytics-tab-wrapper">
        <div class="tab">
          <button
            class="tablinks"
            id="defaultOpen"
            onclick="openTab(event, 'User')"
          >
            User Leaderboard
          </button>
          <button class="tablinks" onclick="openTab(event, 'Group')">
            Group Leaderboard
          </button>
        </div>

        <div id="User" class="tab-content">
          <h1>User Leaderboard</h1>
          <div id="task-information-container">
            <div class="challenges-box">
              <h1>Leaderboard</h1>
              <!-- Leaderboard table showing ranked users -->
              <table>
                <tr>
                  <th>User</th>
                  <th>Points</th>
                </tr>
                <!-- Dynamically populate table rows using Thymeleaf iteration over users list -->
                <tr th:each="user : ${users}">
                  <td>
                    <div class="leaderboard-user-cell">
                      <span th:text="${user.username}"></span>
                      <img
                        class="leaderboard-badge"
                        th:if="${selectedBadgesByUserId[user.id] != null}"
                        th:src="@{'/team_project_badges/' + ${selectedBadgesByUserId[user.id]} + '.png'}"
                        alt="Selected badge"
                      />
                    </div>
                  </td>
                  <td th:text="${user.points}"></td>
                </tr>
              </table>
            </div>
          </div>
        </div>

        <div id="Group" class="tab-content">
          <h1>Group Leaderboard</h1>
          <div id="task-information-container">
            <div class="challenges-box">
              <h1>Leaderboard</h1>
              <!-- Leaderboard table showing ranked users -->
              <table>
                <tr>
                  <th>Group</th>
                  <th>Points</th>
                </tr>
                <!-- Dynamically populate table rows using Thymeleaf iteration over top groups -->
                <tr th:each="group : ${groups}">
                  <td th:text="${group.name}"></td>
                  <td th:text="${group.points}"></td>
                </tr>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main content area displaying leaderboard
      <div id="task-information-container">
        <div class="challenges-box">
          <h1>Leaderboard</h1>
          <Leaderboard table showing ranked users -->

            <tr>
            <th>User</th>
            <th>Points</th>
            </tr>
            < Dynamically populate table rows using Thymeleaf iteration over users list -->
    <!-- <tr th:each="user : ${users}">
            <td th:text="${user.username}"></td>
            <td th:text="${user.points}"></td>
            </tr>
          </table>
        </div>
    </div>
    </div> -->

    <script>
      let dropdown = document.querySelector(".dropdown-button");
      let dropdown_menu = document.querySelector(".sidebar");

      dropdown.addEventListener("click", (e) => {
        e.preventDefault();
        dropdown_menu.classList.toggle("open");
        if (dropdown_menu.classList.contains("open")) {
          document.getElementById("analytics-tab-wrapper").style.display =
            "none";
        } else {
          document.getElementById("analytics-tab-wrapper").style.display =
            "flex";
        }
      });

      window.addEventListener("resize", (e) => {
        if (
          dropdown_menu.classList.contains("open") &&
          !window.matchMedia("(max-width: 1000px)").matches
        ) {
          dropdown_menu.classList.toggle("open");
          document.getElementById("analytics-tab-wrapper").style.display =
            "flex";
        }
      });

      function openTab(event, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
          tabcontent[i].style.display = "none";
        }

        tablinks = document.getElementsByClassName("tablinks");
        for (i = 0; i < tablinks.length; i++) {
          tablinks[i].className = tablinks[i].className.replace(" active", "");
        }

        document.getElementById(tabName).style.display = "block";
        event.currentTarget.className += " active";
      }

      window.onload = function () {
        document.getElementById("defaultOpen").click();
      };
    </script>
  </body>
</html>
