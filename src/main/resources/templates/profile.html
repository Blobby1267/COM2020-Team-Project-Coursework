<!-- Profile Page - Display user's completed tasks and activity history -->
<!doctype html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head>
    <meta charset="UTF-8" />
    <title>Carbon Challenge!</title>
    <link rel="stylesheet" href="styling.css" />
  </head>

  <body>
    <!-- Top navigation bar with logo and logout functionality -->
    <div id="top-bar">
      <div id="topbar-left">
        <img src="Footprint.png" id="logo" alt="footprint" />
        <h1>FOOTPRINT</h1>
        <div sec:authorize="isAuthenticated()" class="points-box">
            <span th:text="${#authentication.name}">Username</span>
            <img id="selected-badge" class="leaderboard-badge" th:if="${selectedBadgeName != null and !#strings.isEmpty(selectedBadgeName)}" th:src="@{'/team_project_badges/' + ${selectedBadgeName} + '.png'}" alt="Selected badge"/>
        </div>
      </div>
      <!-- Logout form with CSRF protection -->
      <form th:action="@{/logout}" th:object="${user}" method="post">
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />
        <button class="log-out" type="submit">Log Out</button>
      </form>
    </div>

    <!-- The sidebar -->
    <div id="main-task-container">
      <button class="dropdown-button">Menu <img src="arrow-down.png" /></button>
      <div class="sidebar">
        <a href="tasks">Tasks</a>
        <a class="active" href="profile">Profile</a>
        <a href="leaderboard">Leaderboard</a>
        <a href="groups">Groups</a>
        <a href="analytics">Analytics</a>
        <a href="evidence">Evidence</a>
        <a sec:authorize="hasRole('ROLE_MODERATOR')" href="challenges"
          >Challenges</a
        >
        <a href="settings">Settings</a>
        <a href="travel">Travel</a>
        <a href="badges">Badges</a>
      </div>
      <!-- Main content area displaying completed tasks -->
      <div id="task-information-container">
        <div class="profile-box">
          <h1>Tasks Completed:</h1>
          <!-- Table of completed tasks with example data -->
          <table>
            <tr>
              <th>Task name</th>
              <th>Date</th>
              <th>Points</th>
              <th>Approval</th>
              <th>Reason</th>
            </tr>
            <tr th:each="evidence, iterStat : ${evidence}">
              <td
                th:text="${evidence.taskTitle != null and !#strings.isEmpty(evidence.taskTitle) ? evidence.taskTitle : (evidence.challenge != null ? evidence.challenge.title : '-')}"
              ></td>
              <td
                th:text="${evidence.submittedAt != null ? #temporals.format(evidence.submittedAt, 'dd/MM/yyyy HH:mm') : '-'}"
              ></td>
              <td
                th:text="${evidence.challenge != null ? evidence.challenge.points : '-'}"
              ></td>
              <td th:text="${evidence.status}"></td>
              <td
                th:text="${evidence.reason != null and !#strings.isEmpty(evidence.reason) ? evidence.reason : '-'}"
              ></td>
            </tr>
          </table>
        </div>
      </div>
    </div>

    <script>
      let dropdown = document.querySelector(".dropdown-button");
      let dropdown_menu = document.querySelector(".sidebar");

      dropdown.addEventListener("click", (e) => {
        e.preventDefault();
        dropdown_menu.classList.toggle("open");
        if (dropdown_menu.classList.contains("open")) {
          document.getElementById("task-information-container").style.display =
            "none";
        } else {
          document.getElementById("task-information-container").style.display =
            "flex";
        }
      });

      window.addEventListener("resize", (e) => {
        if (
          dropdown_menu.classList.contains("open") &&
          !window.matchMedia("(max-width: 1000px)").matches
        ) {
          dropdown_menu.classList.toggle("open");
          document.getElementById("task-information-container").style.display =
            "flex";
        }
      });
    </script>
  </body>
</html>
